<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>aOonigame</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="app-shell">
      <section class="hud">
        <div>
          <p class="eyebrow">新作ホラーゲーム</p>
          <h1>青鬼（風）プロトタイプ</h1>
        </div>
        <div class="status-grid">
          <div class="status-card">
            <span>進行</span>
            <strong id="progressLabel">序盤</strong>
          </div>
          <div class="status-card">
            <span>仲間</span>
            <strong id="partyLabel">3人</strong>
          </div>
          <div class="status-card">
            <span>鍵アイテム</span>
            <strong id="itemLabel">0</strong>
          </div>
          <div class="status-card">
            <span>恐怖</span>
            <strong id="fearLabel">0%</strong>
          </div>
        </div>
      </section>

      <section class="game-panel">
        <div class="scene-meta">
          <p id="sceneStage">序盤</p>
          <p id="sceneLocation">洋館1階</p>
        </div>

        <div class="scene-card">
          <p class="scene-caption" id="sceneCaption">閉ざされた洋館の玄関前</p>
          <h2 id="sceneTitle">目を覚ますと、出口は塞がれていた</h2>
          <p class="scene-text" id="sceneText"></p>
        </div>

        <div class="choice-panel" id="choicePanel"></div>

        <div class="log-panel">
          <div class="log-header">
            <span>記録</span>
            <button id="restartButton" type="button">最初から</button>
          </div>
          <ul id="logList" class="log-list"></ul>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
  </html>
